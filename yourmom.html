<style>
  body.yourmom-page {
    background: #FFC300;
    min-height: 100vh;
  }

  /* ---- Collage stage ---- */
  .ym-stage {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 6rem 2rem 4rem;
    overflow: hidden;
  }

  .ym-collage {
    position: relative;
    width: min(700px, 90vw);
    height: clamp(500px, 65vw, 680px);
  }

  /* Centre piece — newspaper card */
  .ym-card--main {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(-3deg);
    width: 42%;
    z-index: 2;
    filter: drop-shadow(6px 8px 18px rgba(0,0,0,0.22));
  }

  /* Left piece — golden retriever */
  .ym-card--left {
    position: absolute;
    left: -2%;
    bottom: 4%;
    width: 32%;
    z-index: 3;
    transform: rotate(-13deg);
    filter: drop-shadow(4px 6px 14px rgba(0,0,0,0.2));
  }

  /* Right piece — Mike Wazowski */
  .ym-card--right {
    position: absolute;
    right: -2%;
    top: 12%;
    width: 30%;
    z-index: 3;
    transform: rotate(9deg);
    filter: drop-shadow(4px 6px 14px rgba(0,0,0,0.2));
  }

  /* Mobile: stack vertically */
  @media (max-width: 600px) {
    .ym-collage {
      height: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .ym-card--main,
    .ym-card--left,
    .ym-card--right {
      position: relative;
      left: auto; right: auto; top: auto; bottom: auto;
      width: 75%;
      transform: none;
    }
    .ym-card--main  { transform: rotate(-3deg); }
    .ym-card--left  { transform: rotate(-8deg); }
    .ym-card--right { transform: rotate(6deg); }
  }
</style>
